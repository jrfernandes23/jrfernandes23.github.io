<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alex Motors — Contato</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #E8000E;
      --black: #0a0a0a;
      --card: #141414;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #ffffff;
    }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 48px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,0,14,0.18) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
      pointer-events: none;
      z-index: 0;
    }
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeDown 0.6s ease both;
    }
    .logo-ring {
      width: 280px; height: auto;
      border-radius: 12px;
      border: 2px solid var(--border);
      margin: 0 auto 18px;
      overflow: hidden;
      box-shadow: 0 0 32px rgba(232,0,14,0.2);
    }
    .logo-ring img { width: 100%; height: auto; display: block; }
    .brand-name { display: none; }
    .tagline { display: none; }
    .location-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 14px;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .location-btn:hover {
      border-color: #E8000E;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,0,14,0.15);
    }
    .location-btn span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 1.5px;
    }
    .divider {
      width: 100%; display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px; animation: fadeUp 0.6s 0.2s ease both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span {
      font-size: 0.7rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
    }
    .contacts {
      width: 100%; display: flex; flex-direction: column; gap: 14px;
    }
    .contact-card {
      display: flex; align-items: center; gap: 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      text-decoration: none; color: var(--text);
      position: relative; overflow: hidden;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      animation: fadeUp 0.5s ease both;
    }
    .contact-card:nth-child(1) { animation-delay: 0.25s; }
    .contact-card:nth-child(2) { animation-delay: 0.35s; }
    .contact-card:nth-child(3) { animation-delay: 0.45s; }
    .contact-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--red); border-radius: 14px 0 0 14px;
      transform: scaleY(0); transition: transform 0.25s ease;
    }
    .contact-card:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(232,0,14,0.15); }
    .contact-card:hover::before { transform: scaleY(1); }
    .contact-card:active { transform: scale(0.98); }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0;
      overflow: hidden; transition: border-color 0.25s;
      object-fit: cover;
    }
    .contact-card:hover .avatar { border-color: var(--red); }
    .info { flex: 1; }
    .contact-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem; letter-spacing: 1.5px; line-height: 1.1;
    }
    .contact-number { font-size: 0.82rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; }
    .wa-icon { flex-shrink: 0; opacity: 0.5; transition: opacity 0.25s; }
    .contact-card:hover .wa-icon { opacity: 1; }
    .footer {
      margin-top: 40px; text-align: center;
      font-size: 0.68rem; letter-spacing: 1.5px;
      text-transform: uppercase; color: #ffffff;
      animation: fadeUp 0.5s 0.6s ease both;
    }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
